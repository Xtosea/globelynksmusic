<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 GlobelynksMusic</title><style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding-bottom:150px;
}

.container {
  max-width:600px;
  margin:auto;
  padding:15px;
}

h1 { text-align:center; margin-bottom:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input, button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  cursor:pointer;
  background:black;
  color:white;
  border:none;
}

button:hover { opacity:0.85; }

/* FIXED BUTTON GROUP */
.btn-group {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  width:100%;
}

.btn-group button {
  width:100%;
}

.music-img {
  width:250px;
  height:250px;
  border-radius:12px;
  object-fit:cover;
}

#musicList li {
  list-style:none;
  margin-bottom:12px;
  padding:15px;
  border-radius:12px;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

#miniPlayer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  background: #111;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
</style></head><body><div class="container">
<h1>🎵 GlobelynksMusic</h1><ul id="musicList"></ul>
</div><div id="miniPlayer">
  <span id="nowPlaying">No song playing</span>
</div><script>
const apiBase = "https://globelynksmusic.xto1971.workers.dev/api";
let playlist = [];
let audio = new Audio();

async function loadSongs() {
  const res = await fetch(`${apiBase}/list`);
  playlist = await res.json();
  renderSongs();
}

function renderSongs() {
  const list = document.getElementById("musicList");
  list.innerHTML = "";

  console.log("Rendering songs:", playlist);

  playlist.forEach(song => {
    const li = document.createElement("li");

    li.innerHTML = `
      <img class="music-img" src="${apiBase}/image?file=${encodeURIComponent(song.image)}"
      onerror="this.src='https://via.placeholder.com/250?text=No+Image'">

      <h3>${song.title}</h3>
      <p>${song.artist}</p>

      <div class="btn-group">

        <button onclick="playSong('${song.file}')">▶ Play</button>

        <button style="background:#28a745;color:white;"
        onclick="downloadSong('${song.file}','${song.id}')">
        ⬇ Download
        </button>

        <button onclick="likeSong('${song.id}', this)">
        ❤️ Like (${song.likes || 0})
        </button>

        <button onclick="commentSong('${song.id}')">
        💬 Comment
        </button>

      </div>

      <p>Downloads: ${song.downloads || 0}</p>
    `;

    list.appendChild(li);
  });
}

function playSong(file) {
  audio.src = `${apiBase}/download?file=${file}`;
  audio.play();
  document.getElementById("nowPlaying").innerText = file;
}

async function downloadSong(file, id) {
  try {
    await fetch(`${apiBase}/count?file=${file}`);
  } catch (err) {
    console.log("Count failed", err);
  }

  const link = document.createElement("a");
  link.href = `${apiBase}/download?file=${file}`;
  link.download = "";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

async function likeSong(id, btn) {
  const res = await fetch(`${apiBase}/like?id=${id}`, { method: "POST" });
  if (res.ok) {
    const data = await res.json();
    btn.innerText = `❤️ Like (${data.likes})`;
  }
}

async function commentSong(id) {
  const comment = prompt("Enter your comment:");
  if (!comment) return;

  await fetch(`${apiBase}/comment?id=${id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ comment })
  });

  alert("Comment submitted!");
}

loadSongs();
</script></body>
</html>
